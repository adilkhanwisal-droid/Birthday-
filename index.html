<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown ❤️</title>

<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg,#ff4d6d,#ff758f,#ff8fa3);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    padding:20px;
}

h1{
    font-size:2.5rem;
}

#timer{
    margin-top:20px;
    font-size:2rem;
    padding:20px;
    background:rgba(255,255,255,0.2);
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Birthday Countdown ❤️</h1>
    <div id="timer">Loading...</div>
</div>

<script>

// 🎯 SET BIRTHDAY TIME HERE
let birthdayDate = new Date("2026-06-01T00:00:50").getTime();

let x = setInterval(function(){

    let now = new Date().getTime();
    let distance = birthdayDate - now;

    if(distance <= 0){
        clearInterval(x);

        // 👉 redirect to main website
        window.location.href = "index.html";
        return;
    }

    let days = Math.floor(distance / (1000*60*60*24));
    let hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s`;

},1000);

</script>

</body>
</html>
